name: test

on:
  push:
    branches: [main]
  pull_request:

env:
  # Keep stdout UTF-8 across every CI step (Windows cp1252 otherwise breaks
  # rich / click Unicode arrows).
  PYTHONIOENCODING: utf-8

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies (all extras + dev)
        run: uv sync --all-extras --dev

      - name: Ruff lint
        run: uv run ruff check src tests

      - name: Ruff format check
        run: uv run ruff format --check src tests

      - name: Import-Linter (Clean Architecture contracts)
        run: uv run lint-imports

      - name: Mypy (strict)
        # Non-blocking for now — existing 42 errors are tracked; fail will be
        # turned on once the baseline is clean. Keeps mypy visible in CI.
        run: uv run mypy src/ccprophet || true

      - name: Pytest
        run: uv run pytest -q

      - name: Build wheel + sdist
        run: uv build

      - name: Verify wheel contents
        shell: python
        run: |
          import glob, zipfile
          whl = sorted(glob.glob("dist/*.whl"))[-1]
          with zipfile.ZipFile(whl) as z:
              names = z.namelist()
              assert any("LICENSE" in n for n in names), "LICENSE not packaged"
              assert any("_migrations/V1__init.sql" in n for n in names), "migrations not packaged"
              assert any("ccprophet/web/index.html" in n for n in names), "web assets not packaged"
              print(f"wheel OK: {whl} ({len(names)} files)")
